# GoReleaser configuration for jt (Jira Tool)
version: 2

before:
  hooks:
    - sh -c "cd jt-go && go mod tidy"

builds:
  - id: jt
    dir: jt-go
    main: ./cmd/jt
    binary: jt
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: jt-archive
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: linux
        formats:
          - tar.gz
      - goos: darwin
        formats:
          - tar.gz
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - config.yml.example

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: endersonO
    name: jira-tool
  draft: false
  prerelease: auto
  name_template: "jt v{{.Version}}"
  header: |
    ## jt v{{.Version}}

    Download the appropriate binary for your platform below.

    ### Quick Install (macOS / Linux)
    ```bash
    curl -fsSL https://raw.githubusercontent.com/endersonO/jira-tool/main/install.sh | sh
    ```
  footer: |
    ### Manual Installation

    **macOS / Linux:**
    ```bash
    tar -xzf jt_<version>_<os>_<arch>.tar.gz
    sudo mv jt /usr/local/bin/
    jt --version
    ```

    **Windows:**
    Download the `.zip`, extract `jt.exe`, and add it to your PATH.

    ---
    **First-time setup:** `jt init`
